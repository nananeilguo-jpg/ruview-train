name: Train WiFi DensePose Model

on:
  workflow_dispatch:
    inputs:
      recording_url_1:
        description: 'rec_1774768169.jsonl 的下载 URL'
        required: true
      recording_url_2:
        description: 'rec_1774768807.jsonl 的下载 URL'
        required: true
      epochs:
        description: 'Epochs'
        default: '30'
        required: false
      batch_size:
        description: 'Batch Size'
        default: '16'
        required: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:

    - name: Download recordings
      run: |
        mkdir -p data/recordings data/models
        wget -q --show-progress -O data/recordings/rec_1774768169.jsonl \
          "${{ github.event.inputs.recording_url_1 }}"
        wget -q --show-progress -O data/recordings/rec_1774768807.jsonl \
          "${{ github.event.inputs.recording_url_2 }}"
        ls -lh data/recordings/

    - name: Pull and start ruview container
      run: |
        docker pull ruvnet/wifi-densepose:latest
        docker run -d \
          --name ruview \
          -p 3000:3000 \
          -p 3001:3001 \
          -p 5005:5005/udp \
          -e CSI_SOURCE=esp32 \
          -v ${{ github.workspace }}/data:/app/data \
          ruvnet/wifi-densepose:latest
        echo "Waiting for server..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
            echo "Server ready"; break
          fi
          sleep 2
        done
        docker logs ruview --tail 20

    - name: Start training via correct API endpoint
      run: |
        EPOCHS="${{ github.event.inputs.epochs }}"
        BATCH="${{ github.event.inputs.batch_size }}"
        PAYLOAD="{\"dataset_ids\":[\"rec_1774768169\",\"rec_1774768807\"],\"config\":{\"epochs\":${EPOCHS},\"batch_size\":${BATCH},\"learning_rate\":0.0003,\"patience\":10}}"
        echo "Payload: $PAYLOAD"
        HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
          -X POST http://localhost:3000/api/v1/train/start \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")
        echo "HTTP $HTTP — $(cat /tmp/resp.json)"
        if [[ "$HTTP" != "200" && "$HTTP" != "201" && "$HTTP" != "202" ]]; then
          echo "Training trigger failed — probing endpoints:"
          for ep in /api/v1/train/start /api/v1/train/status /api/v1/recording/list /health /api/health; do
            echo -n "  $ep → "; curl -s -o /dev/null -w "%{http_code}\n" http://localhost:3000${ep}
          done
          exit 1
        fi
        echo "Training started!"

    - name: Wait for model file
      run: |
        for i in $(seq 1 150); do
          if ls data/models/*.rvf 2>/dev/null | grep -q .; then
            echo "Model found!"; ls -lh data/models/; exit 0
          fi
          STATUS=$(curl -s http://localhost:3000/api/v1/train/status 2>/dev/null || echo '{}')
          EPOCH=$(echo "$STATUS" | grep -o '"epoch":[0-9]*' | head -1 | cut -d: -f2)
          TOTAL=$(echo "$STATUS" | grep -o '"total_epochs":[0-9]*' | head -1 | cut -d: -f2)
          LOSS=$(echo "$STATUS" | grep -o '"train_loss":[0-9.e+-]*' | head -1 | cut -d: -f2)
          echo "[$(date +%H:%M)] Min ${i}/150 — Epoch ${EPOCH:-?}/${TOTAL:-?}  Loss: ${LOSS:---}"
          sleep 60
        done
        echo "Timeout"; docker logs ruview --tail 50; exit 1

    - name: Upload model
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ruview-rvf-model
        path: data/models/*.rvf
        retention-days: 90

    - name: Save failure logs
      if: failure()
      run: docker logs ruview > /tmp/ruview.log 2>&1 || true

    - uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: ruview-failure-logs
        path: /tmp/ruview.log
